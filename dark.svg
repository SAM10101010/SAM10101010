<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 680" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Sanyam Singla - Holographic Profile">
  <defs>
    <!-- Core Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="50%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#02040a"/>
    </linearGradient>
    
    <!-- Holographic Ambient Orbs -->
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#bd00ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Holographic Card Surface -->
    <linearGradient id="hudGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#121826" stop-opacity="0.6"/>
    </linearGradient>
    
    <!-- Cyber Text Gradient -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="50%" stop-color="#bd00ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
      <animate attributeName="x1" values="-50%;150%;-50%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="50%;250%;50%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Button Gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glitch" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="5" result="noise">
        <animate attributeName="baseFrequency" values="0.6; 0.9; 0.6" dur="2s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
    </filter>

    <!-- Clip Paths -->
    <clipPath id="avatarClip">
      <path d="M 0 -120 L 90 -80 L 120 0 L 90 80 L 0 120 L -90 80 L -120 0 L -90 -80 Z"/>
    </clipPath>

    <!-- Patterns -->
    <pattern id="hexGrid" width="40" height="46" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 40 11.5 L 40 34.5 L 20 46 L 0 34.5 L 0 11.5 Z" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
    
    <pattern id="digitalPixels" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="5" height="5" fill="#00f2ff" opacity="0.1"/>
      <rect x="5" y="5" width="5" height="5" fill="#bd00ff" opacity="0.1"/>
      <rect x="5" y="0" width="1" height="1" fill="#ffffff" opacity="0.5"/>
      <rect x="0" y="5" width="1" height="1" fill="#00ff9d" opacity="0.5"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0,0; 10,10" dur="0.5s" repeatCount="indefinite"/>
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="680" fill="url(#bgGrad)"/>
  <rect width="1200" height="680" fill="url(#hexGrid)"/>

  <!-- Ambient Orbs -->
  <circle cx="200" cy="150" r="350" fill="url(#orbCyan)">
    <animate attributeName="cx" values="200;300;200" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;250;150" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="550" r="400" fill="url(#orbMagenta)">
    <animate attributeName="cx" values="1000;900;1000" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="550;450;550" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Global Noise Overlay -->
  <rect width="1200" height="680" fill="#ffffff" opacity="0.2" filter="url(#noise)" style="mix-blend-mode: overlay;"/>

  <!-- Main HUD Frame -->
  <rect x="40" y="40" width="1120" height="600" rx="20" fill="url(#hudGlass)" stroke="url(#cyberGrad)" stroke-width="2" filter="url(#softGlow)"/>
  
  <!-- HUD Top Bar -->
  <rect x="40" y="40" width="1120" height="50" rx="20" fill="#050810" opacity="0.8"/>
  <rect x="40" y="70" width="1120" height="20" fill="url(#cyberGrad)" opacity="0.1"/>
  <text x="70" y="72" fill="#00f2ff" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2">SYS://PROFILE_INTERFACE_V2.0</text>
  <circle cx="1130" cy="65" r="4" fill="#00ff9d">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="1100" y="72" text-anchor="end" fill="#4a5568" font-family="ui-monospace, monospace" font-size="10">STATUS</text>

  <!-- Left Panel: Holographic Avatar Core -->
  <g transform="translate(280, 350)">
    <!-- Outer Rotating Rings -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#00f2ff" stroke-width="1" stroke-dasharray="2 8" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="175" fill="none" stroke="#bd00ff" stroke-width="2" stroke-dasharray="40 20 10 20" opacity="0.6" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hexagonal Frame -->
    <path d="M 0 -150 L 130 -75 L 130 75 L 0 150 L -130 75 L -130 -75 Z" fill="#030508" stroke="url(#cyberGrad)" stroke-width="3" filter="url(#neonGlow)"/>
    <path d="M 0 -140 L 120 -70 L 120 70 L 0 140 L -120 70 L -120 -70 Z" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

    <!-- Pixel Regeneration Phase 1: Glitch Grid -->
    <g clip-path="url(#avatarClip)">
      <rect x="-150" y="-150" width="300" height="300" fill="url(#digitalPixels)" opacity="0">
        <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.1; 0.4; 0.5; 1" dur="4s" repeatCount="indefinite"/>
      </rect>
      
      <!-- Phase 2: Cybernetic Wireframe Mask -->
      <g opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.5; 0.6; 0.9; 1" dur="4s" repeatCount="indefinite"/>
        
        <path d="M -60 -80 L 60 -80 L 100 -20 L 80 60 L 0 110 L -80 60 L -100 -20 Z" fill="none" stroke="#00f2ff" stroke-width="1.5" filter="url(#neonGlow)"/>
        
        <!-- Cyber Visor -->
        <path d="M -80 -30 L 80 -30 L 100 -10 L 80 10 L -80 10 L -100 -10 Z" fill="#02040a" stroke="#bd00ff" stroke-width="2"/>
        <path d="M -70 -20 L 70 -20 L 80 -10 L 70 0 L -70 0 L -80 -10 Z" fill="#00f2ff" opacity="0.3">
          <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="2s" repeatCount="indefinite"/>
        </path>
        
        <!-- Eyes / Scanners -->
        <rect x="-50" y="-12" width="20" height="4" fill="#ffffff" filter="url(#neonGlow)">
          <animate attributeName="width" values="0; 20; 20; 0" keyTimes="0; 0.2; 0.8; 1" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="30" y="-12" width="20" height="4" fill="#ffffff" filter="url(#neonGlow)">
          <animate attributeName="width" values="0; 20; 20; 0" keyTimes="0; 0.2; 0.8; 1" dur="3s" repeatCount="indefinite"/>
        </rect>
        
        <!-- Mouth / Equalizer -->
        <g transform="translate(0, 50)">
          <rect x="-30" y="0" width="5" height="15" fill="#00ff9d">
            <animate attributeName="height" values="5; 25; 10; 20; 5" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="5; -5; 2; -2; 5" dur="1.2s" repeatCount="indefinite"/>
          </rect>
          <rect x="-15" y="0" width="5" height="10" fill="#00ff9d">
            <animate attributeName="height" values="15; 5; 20; 10; 15" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="-2; 5; -5; 2; -2" dur="1.2s" repeatCount="indefinite"/>
          </rect>
          <rect x="0" y="0" width="5" height="20" fill="#00ff9d">
            <animate attributeName="height" values="10; 20; 5; 15; 10" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="2; -5; 5; -2; 2" dur="1.2s" repeatCount="indefinite"/>
          </rect>
          <rect x="15" y="0" width="5" height="12" fill="#00ff9d">
            <animate attributeName="height" values="20; 10; 15; 5; 20" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="y" values="-5; 2; 0; 5; -5" dur="1.2s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>

    <!-- Scanning Line Effect -->
    <rect x="-150" y="-150" width="300" height="20" fill="#00f2ff" opacity="0.2" clip-path="url(#avatarClip)">
      <animate attributeName="y" values="-150; 150; -150" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating Data Points around Avatar -->
    <g font-family="ui-monospace, monospace" font-size="8" fill="#00f2ff" opacity="0.6">
      <text x="120" y="-120" text-anchor="middle">0x8F2A</text>
      <text x="-130" y="130" text-anchor="middle">SYS::OK</text>
      <text x="130" y="130" text-anchor="middle">150ms</text>
    </g>
  </g>

  <!-- Left Panel Info -->
  <g transform="translate(100, 580)" font-family="ui-monospace, monospace" font-size="11" fill="#8a9ba8">
    <text x="0" y="0">ID: SANYAM_SINGLA</text>
    <text x="0" y="16">LOC: MOHALI, IN</text>
  </g>

  <!-- Right Panel: Main Content -->
  <g transform="translate(520, 110)">
    <!-- Intro -->
    <text x="0" y="0" fill="#bd00ff" font-family="ui-monospace, monospace" font-size="14" letter-spacing="3" filter="url(#softGlow)">
      &gt; INITIALIZING_DEV_PROFILE...
    </text>
    
    <!-- Name with RGB Glitch -->
    <g transform="translate(0, 50)">
      <text x="3" y="0" fill="#00f2ff" font-family="ui-monospace, monospace" font-size="52" font-weight="bold" opacity="0.8" filter="url(#glitch)">
        Sanyam Singla
      </text>
      <text x="-3" y="0" fill="#bd00ff" font-family="ui-monospace, monospace" font-size="52" font-weight="bold" opacity="0.8" filter="url(#glitch)">
        Sanyam Singla
      </text>
      <text x="0" y="0" fill="url(#cyberGrad)" font-family="ui-monospace, monospace" font-size="52" font-weight="bold" filter="url(#softGlow)">
        Sanyam Singla
      </text>
    </g>

    <!-- Role Terminal -->
    <rect x="0" y="80" width="600" height="36" rx="6" fill="#050810" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="16" cy="98" r="4" fill="#ff5555"/>
    <circle cx="30" cy="98" r="4" fill="#ffbd2e"/>
    <circle cx="44" cy="98" r="4" fill="#00ff9d"/>
    <text x="70" y="102" fill="#8a9ba8" font-family="ui-monospace, monospace" font-size="12">
      <tspan x="70" dy="0">cat roles.txt</tspan>
    </text>
    <g transform="translate(70, 130)">
      <text x="0" y="0" fill="#00f2ff" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.3;0.4;1" dur="6s" repeatCount="indefinite"/>
        &gt; AI Engineer &amp; Researcher
      </text>
      <text x="0" y="0" fill="#bd00ff" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.35;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
        &gt; Full Stack Developer
      </text>
      <text x="0" y="0" fill="#00ff9d" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" opacity="0">
        <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.55;0.65;0.75;0.95;1" dur="6s" repeatCount="indefinite"/>
        &gt; Data Analyst &amp; Open Source
      </text>
    </g>

    <!-- Quick Stats Grid -->
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="280" height="80" rx="8" fill="#0a0f1a" stroke="url(#cyberGrad)" stroke-width="1" opacity="0.8"/>
      <text x="15" y="25" fill="#4a5568" font-family="ui-monospace, monospace" font-size="10">FOCUS</text>
      <text x="15" y="50" fill="#ffffff" font-family="ui-monospace, monospace" font-size="14">AI-native Products</text>
      <text x="15" y="68" fill="#8a9ba8" font-family="ui-monospace, monospace" font-size="11">&amp; LLM Systems</text>
      
      <rect x="300" y="0" width="280" height="80" rx="8" fill="#0a0f1a" stroke="url(#cyberGrad)" stroke-width="1" opacity="0.8"/>
      <text x="315" y="25" fill="#4a5568" font-family="ui-monospace, monospace" font-size="10">EDUCATION</text>
      <text x="315" y="50" fill="#ffffff" font-family="ui-monospace, monospace" font-size="14">B.E. CSE</text>
      <text x="315" y="68" fill="#8a9ba8" font-family="ui-monospace, monospace" font-size="11">Chandigarh University</text>
    </g>

    <!-- Tech Stack Neural Network -->
    <g transform="translate(0, 290)">
      <text x="0" y="0" fill="#bd00ff" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" filter="url(#softGlow)">
        // NEURAL_STACK_MAP
      </text>
      
      <g transform="translate(0, 25)">
        <!-- Connection Lines -->
        <path d="M 50 0 L 150 -20 L 250 0 L 350 -20 L 450 0" fill="none" stroke="#00f2ff" stroke-width="1" opacity="0.4" stroke-dasharray="4 4">
          <animate attributeName="stroke-dashoffset" values="0; -16" dur="1s" repeatCount="indefinite"/>
        </path>
        <path d="M 50 30 L 150 50 L 250 30 L 350 50 L 450 30" fill="none" stroke="#bd00ff" stroke-width="1" opacity="0.4" stroke-dasharray="4 4">
          <animate attributeName="stroke-dashoffset" values="0; 16" dur="1.2s" repeatCount="indefinite"/>
        </path>

        <!-- Nodes -->
        <g font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">
          <g transform="translate(50, 0)"><rect x="-30" y="-12" width="60" height="24" rx="4" fill="#050810" stroke="#00f2ff"/><text y="4" fill="#00f2ff">Python</text></g>
          <g transform="translate(150, -20)"><rect x="-35" y="-12" width="70" height="24" rx="4" fill="#050810" stroke="#00f2ff"/><text y="4" fill="#00f2ff">React.js</text></g>
          <g transform="translate(250, 0)"><rect x="-35" y="-12" width="70" height="24" rx="4" fill="#050810" stroke="#bd00ff"/><text y="4" fill="#bd00ff">Next.js</text></g>
          <g transform="translate(350, -20)"><rect x="-35" y="-12" width="70" height="24" rx="4" fill="#050810" stroke="#bd00ff"/><text y="4" fill="#bd00ff">Node.js</text></g>
          <g transform="translate(450, 0)"><rect x="-40" y="-12" width="80" height="24" rx="4" fill="#050810" stroke="#00ff9d"/><text y="4" fill="#00ff9d">TypeScript</text></g>
          
          <g transform="translate(50, 30)"><rect x="-35" y="-12" width="70" height="24" rx="4" fill="#050810" stroke="#00f2ff"/><text y="4" fill="#00f2ff">MongoDB</text></g>
          <g transform="translate(150, 50)"><rect x="-35" y="-12" width="70" height="24" rx="4" fill="#050810" stroke="#bd00ff"/><text y="4" fill="#bd00ff">Docker</text></g>
          <g transform="translate(250, 30)"><rect x="-30" y="-12" width="60" height="24" rx="4" fill="#050810" stroke="#00ff9d"/><text y="4" fill="#00ff9d">AWS</text></g>
          <g transform="translate(350, 50)"><rect x="-30" y="-12" width="60" height="24" rx="4" fill="#050810" stroke="#00f2ff"/><text y="4" fill="#00f2ff">Flutter</text></g>
          <g transform="translate(450, 30)"><rect x="-40" y="-12" width="80" height="24" rx="4" fill="#050810" stroke="#bd00ff"/><text y="4" fill="#bd00ff">LLM APIs</text></g>
        </g>
      </g>
    </g>
  </g>

  <!-- Clickable Holographic Buttons -->
  <g transform="translate(600, 570)" font-family="ui-monospace, monospace" font-size="12" font-weight="bold" text-anchor="middle">
    
    <!-- GitHub Button -->
