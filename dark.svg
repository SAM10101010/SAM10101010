      <g transform="translate(-160, 0)">
        <rect x="-70" y="-22" width="140" height="44" rx="22" fill="url(#btnGrad)" stroke="#00f2ff" stroke-width="1.5" filter="url(#softGlow)"/>
        <path d="M-12 -8c-4.4 0-8 3.6-8 8 0 3.5 2.3 6.5 5.5 7.6.4.1.5-.2.5-.4v-1.4c-2.2.5-2.7-1.1-2.7-1.1-.4-.9-.9-1.2-.9-1.2-.7-.5.1-.5.1-.5.8.1 1.2.8 1.2.8.7 1.2 1.8.8 2.2.7.1-.5.3-.8.5-1-1.8-.2-3.6-.9-3.6-3.9 0-.9.3-1.6.8-2.1-.1-.2-.4-1 .1-2.1 0 0 .7-.2 2.2.8.6-.2 1.3-.3 2-.3.7 0 1.4.1 2 .3 1.5-1 2.2-.8 2.2-.8.4 1.1.1 1.9.1 2.1.5.6.8 1.3.8 2.1 0 3.1-1.8 3.7-3.6 3.9.3.3.5.8.5 1.4v2.1c0 .2.1.5.5.4 3.2-1.1 5.5-4.1 5.5-7.6 0-4.4-3.6-8-8-8z" fill="#00f2ff" transform="scale(0.8) translate(-40, -2)"/>
        <text x="10" y="4" fill="#00f2ff">GITHUB</text>
        <animate attributeName="opacity" values="0.8; 1; 0.8" dur="2s" repeatCount="indefinite"/>
