        <path d="M-20 -15h4v4h-4zm0 6h4v14h-4zm6 -6h4v2c1-1.5 2.5-2.5 5-2.5 5 0 6 3 6 7.5v8h-4v-7c0-2-.5-3.5-2.5-3.5s-3 1.5-3 3.5v7h-4v-20z" fill="#bd00ff" transform="scale(0.8) translate(-30, 0)"/>
        <text x="10" y="4" fill="#bd00ff">LINKEDIN</text>
